<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="DZYN - متجر الملابس والأحذية الفاخرة في الجزائر | Boutique de vêtements et chaussures de luxe en Algérie">
    <meta name="keywords" content="DZYN, ملابس, أحذية, أزياء, الجزائر, vêtements, chaussures, mode, Algérie">
    <meta name="author" content="DZYN">
    <meta name="theme-color" content="#000000">
    <meta property="og:title" content="DZYN - متجر الأزياء الفاخرة">
    <meta property="og:description" content="اكتشف أحدث صيحات الموضة من الملابس والأحذية">
    <meta property="og:type" content="website">
    <title>DZYN - متجر الأزياء الفاخرة | Boutique de Mode</title>
    <style>
        :root {
            --black: #000000;
            --white: #ffffff;
            --gray-50: #fafafa;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-300: #d4d4d4;
            --gray-400: #a3a3a3;
            --gray-500: #737373;
            --gray-600: #525252;
            --gray-700: #404040;
            --gray-800: #262626;
            --gray-900: #171717;
            --gold: #c9a96e;
            --red: #dc2626;
            --green: #16a34a;
            --blue: #2563eb;
            --font-ar: 'Cairo', 'Tajawal', sans-serif;
            --font-fr: 'Montserrat', 'Inter', sans-serif;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px rgba(0, 0, 0, 0.07);
            --shadow-lg: 0 10px 25px rgba(0, 0, 0, 0.1);
            --shadow-xl: 0 20px 50px rgba(0, 0, 0, 0.15);
            --radius-sm: 4px;
            --radius: 8px;
            --radius-lg: 16px;
            --radius-xl: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-ar);
            background: var(--white);
            color: var(--gray-900);
            line-height: 1.6;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background var(--transition), color var(--transition);
        }
        body.fr {
            font-family: var(--font-fr);
        }

        /* LOADING SCREEN */
        #loadingScreen {
            position: fixed;
            inset: 0;
            z-index: 99999;
            background: var(--black);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }
        #loadingScreen.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loadingScreen .loader-logo {
            font-size: 3rem;
            font-weight: 900;
            color: var(--white);
            letter-spacing: 8px;
            animation: pulseLogo 1.5s ease-in-out infinite;
        }
        #loadingScreen .loader-bar {
            width: 200px;
            height: 2px;
            background: var(--gray-700);
            margin-top: 20px;
            border-radius: 1px;
            overflow: hidden;
        }
        #loadingScreen .loader-bar-inner {
            height: 100%;
            background: var(--white);
            width: 0%;
            animation: loadBar 1.2s ease-in-out forwards;
        }
        @keyframes pulseLogo {
            0%,
            100% {
                opacity: 0.6;
            }
            50% {
                opacity: 1;
            }
        }
        @keyframes loadBar {
            0% {
                width: 0%;
            }
            60% {
                width: 70%;
            }
            100% {
                width: 100%;
            }
        }

        /* TOAST */
        #toastContainer {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 99998;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }
        .toast {
            padding: 14px 24px;
            border-radius: var(--radius);
            color: var(--white);
            font-weight: 600;
            font-size: 0.9rem;
            animation: slideDown 0.4s ease, fadeOut 0.4s ease 2.6s forwards;
            pointer-events: auto;
            box-shadow: var(--shadow-lg);
            text-align: center;
            min-width: 250px;
            max-width: 90vw;
        }
        .toast.success {
            background: var(--green);
        }
        .toast.error {
            background: var(--red);
        }
        .toast.info {
            background: var(--blue);
        }
        .toast.warning {
            background: #f59e0b;
            color: #000;
        }
        @keyframes slideDown {
            from {
                transform: translateY(-40px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeOut {
            from {
                opacity: 1;
            }
            to {
                opacity: 0;
                transform: translateY(-20px);
            }
        }

        /* NAVBAR */
        #navbar {
            position: sticky;
            top: 0;
            z-index: 9990;
            background: var(--white);
            border-bottom: 1px solid var(--gray-200);
            transition: all var(--transition);
        }
        #navbar.scrolled {
            box-shadow: var(--shadow);
        }
        .nav-inner {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }
        .nav-logo {
            font-size: 1.8rem;
            font-weight: 900;
            letter-spacing: 4px;
            color: var(--black);
            text-decoration: none;
            cursor: pointer;
            transition: var(--transition);
        }
        .nav-logo:hover {
            opacity: 0.7;
        }
        .nav-links {
            display: flex;
            gap: 28px;
            list-style: none;
            align-items: center;
        }
        .nav-links a,
        .nav-links button {
            text-decoration: none;
            color: var(--gray-700);
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            background: none;
            border: none;
            font-family: inherit;
            transition: var(--transition);
            position: relative;
            padding: 4px 0;
        }
        .nav-links a:hover,
        .nav-links button:hover {
            color: var(--black);
        }
        .nav-links a::after,
        .nav-links button::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--black);
            transition: width var(--transition);
        }
        .nav-links a:hover::after,
        .nav-links button:hover::after {
            width: 100%;
        }
        .nav-lang-btn {
            font-weight: 700 !important;
            color: var(--gray-500) !important;
            font-size: 0.8rem !important;
            letter-spacing: 1px;
            padding: 6px 12px !important;
            border: 1px solid var(--gray-300) !important;
            border-radius: var(--radius-sm) !important;
            transition: all var(--transition) !important;
        }
        .nav-lang-btn:hover {
            border-color: var(--black) !important;
            color: var(--black) !important;
        }
        .nav-lang-btn.active-lang {
            background: var(--black);
            color: var(--white) !important;
            border-color: var(--black) !important;
        }
        .nav-user-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: var(--gray-200);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1rem;
            transition: var(--transition);
            border: none;
            font-family: inherit;
        }
        .nav-user-icon:hover {
            background: var(--gray-300);
        }
        .mobile-menu-btn {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            font-size: 1.5rem;
            color: var(--black);
        }
        @media (max-width: 900px) {
            .nav-links {
                display: none;
                position: absolute;
                top: 64px;
                left: 0;
                right: 0;
                background: var(--white);
                flex-direction: column;
                padding: 20px;
                gap: 16px;
                border-bottom: 1px solid var(--gray-200);
                box-shadow: var(--shadow-lg);
            }
            .nav-links.open {
                display: flex;
            }
            .mobile-menu-btn {
                display: block;
            }
        }

        /* MAIN CONTENT */
        #mainContent {
            min-height: 70vh;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* HERO */
        .hero-section {
            position: relative;
            height: 80vh;
            min-height: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-900);
            color: var(--white);
            overflow: hidden;
            text-align: center;
        }
        .hero-bg {
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #1a1a1a 0%, #0a0a0a 50%, #1a1a1a 100%);
            z-index: 0;
        }
        .hero-content {
            position: relative;
            z-index: 1;
            padding: 40px;
            animation: fadeUp 1s ease;
        }
        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .hero-title {
            font-size: clamp(2.5rem, 6vw, 5rem);
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 16px;
            line-height: 1.1;
        }
        .hero-subtitle {
            font-size: clamp(1rem, 2vw, 1.4rem);
            font-weight: 300;
            letter-spacing: 3px;
            opacity: 0.8;
            margin-bottom: 32px;
        }
        .hero-btn {
            display: inline-block;
            padding: 16px 40px;
            background: var(--white);
            color: var(--black);
            text-decoration: none;
            font-weight: 700;
            letter-spacing: 2px;
            border-radius: var(--radius);
            transition: all var(--transition);
            cursor: pointer;
            border: 2px solid var(--white);
            font-family: inherit;
            font-size: 0.9rem;
        }
        .hero-btn:hover {
            background: transparent;
            color: var(--white);
        }
        .hero-btn.outline {
            background: transparent;
            color: var(--white);
            border: 2px solid var(--white);
            margin-left: 12px;
        }
        .hero-btn.outline:hover {
            background: var(--white);
            color: var(--black);
        }

        /* SECTIONS */
        .section {
            padding: 80px 0;
        }
        .section-title {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-align: center;
            margin-bottom: 12px;
            color: var(--black);
        }
        .section-subtitle {
            text-align: center;
            color: var(--gray-500);
            margin-bottom: 48px;
            font-weight: 300;
            letter-spacing: 1px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 28px;
        }
        @media (max-width: 600px) {
            .products-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }
        }
        .product-card {
            background: var(--white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            cursor: pointer;
            transition: all var(--transition);
            position: relative;
            border: 1px solid transparent;
        }
        .product-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-xl);
            border-color: var(--gray-200);
        }
        .product-card-img {
            position: relative;
            aspect-ratio: 3/4;
            background: var(--gray-100);
            overflow: hidden;
        }
        .product-card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .product-card:hover .product-card-img img {
            transform: scale(1.06);
        }
        .product-card-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.7rem;
            font-weight: 700;
            letter-spacing: 1px;
            z-index: 2;
        }
        .badge-sale {
            background: var(--red);
            color: var(--white);
        }
        .badge-new {
            background: var(--black);
            color: var(--white);
        }
        .badge-bestseller {
            background: var(--gold);
            color: var(--black);
        }
        .product-card-fav {
            position: absolute;
            top: 12px;
            right: 12px;
            z-index: 2;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: var(--white);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            transition: all var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .product-card-fav:hover {
            transform: scale(1.15);
            box-shadow: var(--shadow);
        }
        .product-card-fav.liked {
            color: var(--red);
        }
        .product-card-info {
            padding: 16px;
            text-align: center;
        }
        .product-card-name {
            font-weight: 600;
            font-size: 0.95rem;
            margin-bottom: 6px;
            color: var(--gray-800);
        }
        .product-card-prices {
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
        }
        .product-card-old-price {
            text-decoration: line-through;
            color: var(--gray-400);
            font-size: 0.85rem;
        }
        .product-card-new-price {
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--black);
        }
        .product-card-dzd {
            font-size: 0.75rem;
            color: var(--gray-500);
            font-weight: 400;
        }
        .product-card-stars {
            color: var(--gold);
            font-size: 0.8rem;
            margin-top: 4px;
        }

        /* FILTERS */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            align-items: center;
            margin-bottom: 32px;
            padding: 16px 20px;
            background: var(--gray-50);
            border-radius: var(--radius);
        }
        .filters-bar input,
        .filters-bar select {
            padding: 10px 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.85rem;
            background: var(--white);
            transition: var(--transition);
            min-width: 130px;
        }
        .filters-bar input:focus,
        .filters-bar select:focus {
            outline: none;
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .filters-bar input {
            flex: 1;
            min-width: 200px;
        }

        /* PRODUCT DETAIL */
        .product-detail {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 48px;
            padding: 40px 0;
        }
        @media (max-width: 768px) {
            .product-detail {
                grid-template-columns: 1fr;
                gap: 24px;
            }
        }
        .product-gallery {
            position: sticky;
            top: 80px;
        }
        @media (max-width: 768px) {
            .product-gallery {
                position: static;
            }
        }
        .product-gallery-main {
            aspect-ratio: 3/4;
            background: var(--gray-100);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 12px;
        }
        .product-gallery-main img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-gallery-thumbs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .product-gallery-thumb {
            width: 60px;
            height: 80px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: var(--transition);
            background: var(--gray-100);
        }
        .product-gallery-thumb.active {
            border-color: var(--black);
        }
        .product-gallery-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .product-info h1 {
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .product-info .product-type-label {
            display: inline-block;
            padding: 4px 12px;
            background: var(--gray-100);
            border-radius: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
            margin-bottom: 16px;
            color: var(--gray-600);
        }
        .product-info .product-desc {
            color: var(--gray-600);
            margin-bottom: 20px;
            line-height: 1.8;
        }
        .product-info .price-block {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 20px;
        }
        .product-info .old-price {
            text-decoration: line-through;
            color: var(--gray-400);
            font-size: 1.2rem;
        }
        .product-info .new-price {
            font-size: 2rem;
            font-weight: 800;
            color: var(--black);
        }
        .product-options {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 24px;
        }
        .product-options label {
            font-weight: 600;
            font-size: 0.85rem;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 1px;
        }
        .product-options select {
            padding: 10px 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: inherit;
            min-width: 120px;
            background: var(--white);
        }
        .color-dots {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .color-dot {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
        }
        .color-dot.selected {
            border-color: var(--black);
            transform: scale(1.2);
            box-shadow: var(--shadow);
        }
        .btn {
            display: inline-block;
            padding: 14px 32px;
            font-weight: 700;
            letter-spacing: 1px;
            border-radius: var(--radius);
            cursor: pointer;
            transition: all var(--transition);
            border: none;
            font-family: inherit;
            font-size: 0.9rem;
            text-align: center;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--black);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--gray-800);
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }
        .btn-outline {
            background: transparent;
            color: var(--black);
            border: 2px solid var(--black);
        }
        .btn-outline:hover {
            background: var(--black);
            color: var(--white);
        }
        .btn-sm {
            padding: 8px 16px;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        .btn-danger {
            background: var(--red);
            color: var(--white);
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-gold {
            background: var(--gold);
            color: var(--black);
        }
        .btn-gold:hover {
            background: #b8963e;
        }

        /* MODAL */
        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 99995;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.3s ease;
            backdrop-filter: blur(4px);
        }
        .modal {
            background: var(--white);
            border-radius: var(--radius-lg);
            padding: 32px;
            max-width: 500px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            position: relative;
            box-shadow: var(--shadow-xl);
            animation: scaleIn 0.3s ease;
        }
        @keyframes scaleIn {
            from {
                transform: scale(0.9);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }
        .modal-close {
            position: absolute;
            top: 12px;
            right: 16px;
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--gray-500);
            transition: var(--transition);
            z-index: 2;
        }
        .modal-close:hover {
            color: var(--black);
        }
        .modal h2 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            font-family: inherit;
            font-size: 0.9rem;
            transition: var(--transition);
            background: var(--white);
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .phone-input-wrap {
            display: flex;
            align-items: center;
            border: 1px solid var(--gray-300);
            border-radius: var(--radius-sm);
            overflow: hidden;
            transition: var(--transition);
        }
        .phone-input-wrap:focus-within {
            border-color: var(--black);
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .phone-prefix {
            padding: 12px 14px;
            background: var(--gray-100);
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--gray-700);
            white-space: nowrap;
            border-right: 1px solid var(--gray-300);
        }
        .phone-input-wrap input {
            border: none !important;
            flex: 1;

        async function handleAuth(event, mode) {
            event.preventDefault();
            const email = document.getElementById('authEmail').value.trim();
            const password = document.getElementById('authPassword').value.trim();
            if (mode === 'register') {
                const fullName = document.getElementById('authFullName').value.trim();
                const result = await apiCall('register', { email, password, fullName, role: 'user' });
                if (result.success) {
                    showToast(t('toast_register_success'), 'success');
                    closeModal();
                    openAuthModal('login');
                } else {
                    showToast(result.error === 'Email already exists' ? t('toast_duplicate_email') : t('toast_error'),
                        'error');
                }
            } else {
                const result = await apiCall('login', { email, password });
                if (result.success && result.data) {
                    currentUser = result.data;
                    localStorage.setItem('dzyn_user', JSON.stringify(currentUser));
                    showToast(t('toast_login_success'), 'success');
                    closeModal();
                    updateNavUI();
                    if (currentUser.Role === 'admin') navigateTo('admin');
                    else navigateTo('home');
                } else {
                    showToast(t('toast_error'), 'error');
                }
            }
        }

            currentUser = null;
            localStorage.removeItem('dzyn_user');
            updateNavUI();

            showToast(t('btn_logout'), 'info');

        async function handleOrder(event, productId) {
            event.preventDefault();
            const product = allProducts.find(p => p.ProductID === productId);
            if (!product) return;
            if (parseInt(product.Stock) <= 0) {
                showToast(t('toast_stock_empty'), 'warning');
                return;
            }
            const orderData = {
                productId,
                productName: product.Name,
                productType: product.Type,
                productImage: product.MainImage || (product.Images ? product.Images.split(',')[0] : ''),
                size: document.getElementById('orderSize').value,
                color: document.getElementById('orderColor').value,
                quantity: parseInt(document.getElementById('orderQuantity').value),
                fullName: document.getElementById('orderFullName').value.trim(),
                phone: '+213' + document.getElementById('orderPhone').value.trim(),
                wilaya: document.getElementById('orderWilaya').value,
                address: document.getElementById('orderAddress').value.trim(),
                shippingCompany: document.getElementById('orderShipping').value,
                price: Number(product.NewPrice) * parseInt(document.getElementById('orderQuantity').value),
                userEmail: currentUser ? currentUser.Email : '',
            };
            const result = await apiCall('createOrder', orderData);
            if (result.success) {
                showToast(t('toast_order_success'), 'success');
                closeModal();
                // Update local stock
                product.Stock = String(parseInt(product.Stock) - orderData.quantity);
                renderPage();
            } else {
                showToast(t('toast_error'), 'error');
            }
        }

        // ==================== RENDER PAGES ====================
        async function renderPage() {
            const main = document.getElementById('mainContent');
            updateNavUI();
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.body.className = currentLang === 'fr' ? 'fr' : '';
            document.querySelectorAll('.nav-lang-btn').forEach(b => {
                b.classList.toggle('active-lang', b.textContent.trim().toLowerCase() === currentLang);
            });

            // Load products
            const productsResult = await apiCall('getAllProducts');
            allProducts = productsResult.data || [];
            const settingsResult = await apiCall('getSettings');
            const settings = settingsResult.data || {};

            switch (currentPage) {
                case 'home':
                    renderHome(settings);
                    break;
                case 'products':
                    renderProducts();
                    break;
                case 'product':
                    renderProductDetail();
                    break;
                case 'admin':
                    if (!currentUser || currentUser.Role !== 'admin') {
                        main.innerHTML =
                            `<div class="container section text-center"><h2>${t('toast_error')}</h2></div>`;
                        return;
                    }
                    renderAdmin();
                    break;
                case 'account':
                    if (!currentUser) {
                        openAuthModal('login');
                        navigateTo('home');
                        return;
                    }
                    renderAccount();
                    break;
                default:
                    renderHome(settings);
            }

            // Update footer
            if (settings.StorePhone) document.getElementById('footerPhone').textContent = settings.StorePhone;
            if (settings.StoreEmail) document.getElementById('footerEmail').textContent = settings.StoreEmail;
        }

        function productCard(product) {
            const img = product.MainImage || (product.Images ? product.Images.split(',')[0] : 'https://picsum.photos/seed/default/600/800');
            const isLiked = favorites.includes(product.ProductID);
            const hasSale = product.OldPrice && Number(product.OldPrice) > Number(product.NewPrice);
            const isNew = product.CreatedAt && (new Date() - new Date(product.CreatedAt)) < 30 * 24 * 60 * 60 * 1000;
            const isOutOfStock = parseInt(product.Stock) <= 0;
            let badge = '';
            if (hasSale) badge = `<span class="product-card-badge badge-sale">${currentLang === 'ar' ? 'تخفيض' : 'Soldes'}</span>`;
            else if (isNew) badge =
                `<span class="product-card-badge badge-new">${currentLang === 'ar' ? 'جديد' : 'Nouveau'}</span>`;
            if (product.BestSeller === 'true' && !hasSale) badge =
                `<span class="product-card-badge badge-bestseller">${currentLang === 'ar' ? 'الأكثر مبيعًا' : 'Best Seller'}</span>`;

            return `
            <div class="product-card" onclick="navigateTo('product');localStorage.setItem('dzyn_selected_product','${product.ProductID}')">
              <div class="product-card-img">
                <img src="${img}" alt="${product.Name}" loading="lazy" onerror="this.src='https://picsum.photos/seed/fallback/600/800'">
                ${badge}
                ${isOutOfStock ? `<div style="position:absolute;inset:0;background:rgba(255,255,255,0.7);display:flex;align-items:center;justify-content:center;z-index:3;font-weight:700;font-size:0.9rem;letter-spacing:2px;">${currentLang === 'ar' ? 'نفد المخزون' : 'Épuisé'}</div>` : ''}
                <button class="product-card-fav ${isLiked ? 'liked' : ''}" onclick="event.stopPropagation();toggleFav('${product.ProductID}')" title="${t('btn_fav')}">${isLiked ? '❤️' : '🤍'}</button>
              </div>
              <div class="product-card-info">
                <p class="product-card-name">${product.Name}</p>
                <div class="product-card-prices">
                  ${hasSale ? `<span class="product-card-old-price">${Number(product.OldPrice).toLocaleString()} DZD</span>` : ''}
                  <span class="product-card-new-price">${Number(product.NewPrice).toLocaleString()} <span class="product-card-dzd">DZD</span></span>
                </div>
                <div class="product-card-stars">★★★★★</div>
              </div>
            </div>`;
        }

        function toggleFav(productId) {
            if (!currentUser) {

            const idx = favorites.indexOf(productId);
            if (idx > -1) {

            } else {
                favorites.push(productId);

            localStorage.setItem('dzyn_favs', JSON.stringify(favorites));
            renderPage();
        }

                  <option value="all">${t('all')}</option>
                  <option value="Clothes" ${param==='Clothes'?'selected':''}>${t('nav_clothes')}</option>
                  <option value="Shoes" ${param==='Shoes'?'selected':''}>${t('nav_shoes')}</option>
                </select>
                <select id="filterSort" onchange="filterProducts()">
                  <option value="newest">${t('sort_newest')}</option>
                  <option value="oldest">${t('sort_oldest')}</option>
                  <option value="cheapest">${t('sort_cheapest')}</option>
                  <option value="expensive">${t('sort_expensive')}</option>
                  <option value="bestseller">${t('sort_bestseller')}</option>
                </select>
              </div>
              <div class="products-grid" id="productsGrid">
                ${filtered.map(p => productCard(p)).join('') || `<p class="text-center" style="grid-column:1/-1;color:var(--gray-500);">${t('no_products')}</p>`}
              </div>
            </div>`;
            window._filteredProducts = filtered;
        }

        function filterProducts() {
            const search = (document.getElementById('searchInput')?.value || '').toLowerCase();
            const type = document.getElementById('filterType')?.value || 'all';
            const sort = document.getElementById('filterSort')?.value || 'newest';
            let filtered = [...allProducts];
            if (!currentUser || currentUser.Role !== 'admin') {
                filtered = filtered.filter(p => p.Visible === 'true');
            }
            if (type !== 'all') filtered = filtered.filter(p => p.Type === type);
            if (search) filtered = filtered.filter(p => p.Name.toLowerCase().includes(search));
            switch (sort) {
                case 'newest':
                    filtered.sort((a, b) => new Date(b.CreatedAt) - new Date(a.CreatedAt));
                    break;
                case 'oldest':
                    filtered.sort((a, b) => new Date(a.CreatedAt) - new Date(b.CreatedAt));
                    break;
                case 'cheapest':
                    filtered.sort((a, b) => Number(a.NewPrice) - Number(b.NewPrice));
                    break;
                case 'expensive':
                    filtered.sort((a, b) => Number(b.NewPrice) - Number(a.NewPrice));
                    break;
                case 'bestseller':
                    filtered.sort((a, b) => (b.BestSeller === 'true' ? 1 : 0) - (a.BestSeller === 'true' ? 1 : 0));
                    break;
            }
            const grid = document.getElementById('productsGrid');
            if (grid) {
                grid.innerHTML = filtered.map(p => productCard(p)).join('') ||
                    `<p class="text-center" style="grid-column:1/-1;color:var(--gray-500);">${t('no_products')}</p>`;
            }
        }

        async function renderProductDetail() {
            const main = document.getElementById('mainContent');
            const productId = localStorage.getItem('dzyn_selected_product');
            const product = allProducts.find(p => p.ProductID === productId);
            if (!product) {
                main.innerHTML =
                    `<div class="container section text-center"><h2>${t('no_products')}</h2></div>`;
                return;
            }
            const images = product.Images ? product.Images.split(',') : [product.MainImage || 'https://picsum.photos/seed/default/600/800'];
            const sizes = product.Sizes ? product.Sizes.split(',') : [];
            const colors = product.Colors ? product.Colors.split(',') : [];
            const hasSale = product.OldPrice && Number(product.OldPrice) > Number(product.NewPrice);
            const isLiked = favorites.includes(product.ProductID);
            const isOutOfStock = parseInt(product.Stock) <= 0;
            const reviewsResult = await apiCall('getReviews', { productId });
            const reviews = reviewsResult.data || [];
            const avgRating = reviews.length > 0 ? (reviews.reduce((s, r) => s + Number(r.Rating), 0) / reviews.length)
                .toFixed(1) : '0.0';

            main.innerHTML = `
            <div class="container">
              <div class="product-detail">
                <div class="product-gallery">
                  <div class="product-gallery-main">
                    <img src="${images[0]}" alt="${product.Name}" id="galleryMain" onerror="this.src='https://picsum.photos/seed/fallback/600/800'">
                  </div>
                  <div class="product-gallery-thumbs">
                    ${images.map((img, i) => `
                      <div class="product-gallery-thumb ${i===0?'active':''}" onclick="document.getElementById('galleryMain').src='${img}';document.querySelectorAll('.product-gallery-thumb').forEach((t,j)=>t.classList.toggle('active',j===${i}))">
                        <img src="${img}" alt="thumbnail" onerror="this.src='https://picsum.photos/seed/thumb${i}/60/80'">
                      </div>`).join('')}
                  </div>
                </div>
                <div class="product-info">
                  <span class="product-type-label">${product.Type === 'Clothes' ? t('nav_clothes') : t('nav_shoes')}</span>
                  <h1>${product.Name}</h1>
                  <p class="product-desc">${product.Description}</p>
                  <div class="price-block">
                    ${hasSale ? `<span class="old-price">${Number(product.OldPrice).toLocaleString()} DZD</span>` : ''}
                    <span class="new-price">${Number(product.NewPrice).toLocaleString()} DZD</span>
                  </div>
                  <div style="display:flex;align-items:center;gap:8px;margin-bottom:16px;">
                    <span style="color:var(--gold);font-size:1.2rem;">${'★'.repeat(Math.round(Number(avgRating)))}${'☆'.repeat(5-Math.round(Number(avgRating)))}</span>
                    <span style="font-size:0.85rem;color:var(--gray-500);">(${avgRating} - ${reviews.length} ${currentLang==='ar'?'تقييم':'avis'})</span>
                  </div>
                  <p style="font-size:0.85rem;color:${isOutOfStock?'var(--red)':'var(--green)'};font-weight:600;margin-bottom:16px;">
                    ${isOutOfStock ? t('toast_stock_empty') : `${currentLang==='ar'?'متوفر':'Disponible'}: ${product.Stock}`}
                  </p>
                  <div class="product-options">
                    <div>
                      <label>${t('lbl_size')}</label>
                      <select id="detailSize">
                        ${sizes.map(s => `<option value="${s.trim()}">${s.trim()}</option>`).join('')}
                      </select>
                    </div>
                    <div>
                      <label>${t('lbl_color')}</label>
                      <div class="color-dots">
                        ${colors.map((c, i) => `<span class="color-dot ${i===0?'selected':''}" style="background:${getColorHex(c.trim())};" onclick="document.querySelectorAll('.color-dot').forEach(d=>d.classList.remove('selected'));this.classList.add('selected')" title="${c.trim()}"></span>`).join('')}
                      </div>
                    </div>
                  </div>
                  <div style="display:flex;gap:12px;flex-wrap:wrap;">
                    <button class="btn btn-primary" onclick="openOrderModalFromDetail('${product.ProductID}')" ${isOutOfStock?'disabled style="opacity:0.5;cursor:not-allowed;"':''}>${t('btn_order')}</button>
                    <button class="btn btn-outline" onclick="toggleFav('${product.ProductID}')">${isLiked ? '❤️' : '🤍'} ${t('btn_fav')}</button>
                    <button class="btn btn-outline" onclick="if(currentUser){openReviewModal(allProducts.find(p=>p.ProductID==='${product.ProductID}'))}else{openAuthModal('login')}">⭐ ${currentLang==='ar'?'تقييم':'Avis'}</button>
                  </div>
                </div>
              </div>
              <section class="section" style="padding-top:0;">
                <h3 style="font-size:1.3rem;font-weight:700;margin-bottom:20px;">${currentLang==='ar'?'التقييمات':'Avis'} (${reviews.length})</h3>
                ${reviews.length === 0 ? `<p style="color:var(--gray-500);">${currentLang==='ar'?'لا توجد تقييمات بعد':'Aucun avis pour le moment'}</p>` : reviews.map(r => `
                  <div style="background:var(--gray-50);padding:16px;border-radius:var(--radius);margin-bottom:12px;">
                    <strong>${r.UserName}</strong>
                    <span style="color:var(--gold);margin:0 8px;">${'★'.repeat(Number(r.Rating))}${'☆'.repeat(5-Number(r.Rating))}</span>
                    <span style="font-size:0.75rem;color:var(--gray-400);">${r.CreatedAt}</span>
                    <p style="margin-top:6px;color:var(--gray-600);">${r.Comment}</p>
                  </div>`).join('')}
              </section>
            </div>`;
        }

        function openOrderModalFromDetail(productId) {
            const product = allProducts.find(p => p.ProductID === productId);
            if (product) openOrderModal(product);
        }

        function getColorHex(colorName) {
            const map = {
                'أسود': '#000000',
                'أبيض': '#ffffff',
                'رمادي': '#808080',
                'أحمر': '#dc2626',
                'أزرق': '#2563eb',
                'أخضر': '#16a34a',
                'بني': '#8b4513',
                'بيج': '#f5f5dc',
                'كحلي': '#1a1a4b',
                'ذهبي': '#c9a96e',
                'black': '#000000',
                'white': '#ffffff',
                'gray': '#808080',
                'red': '#dc2626',
                'blue': '#2563eb',
                'green': '#16a34a',
                'brown': '#8b4513',
                'beige': '#f5f5dc',
                'navy': '#1a1a4b',
                'gold': '#c9a96e',
            };
            return map[colorName] || '#cccccc';
        }

        function renderAccount() {
            const main = document.getElementById('mainContent');
            if (!currentUser) return;
            const userOrders = []; // Would fetch from API
            const favProducts = allProducts.filter(p => favorites.includes(p.ProductID));
            main.innerHTML = `
            <div class="container section">
              <h2 class="section-title">${currentLang==='ar'?'حسابي':'Mon Compte'}</h2>
              <p class="section-subtitle">✦</p>
              <div style="max-width:600px;margin:0 auto;background:var(--gray-50);padding:24px;border-radius:var(--radius-lg);">
                <p><strong>${t('lbl_fullname')}:</strong> ${currentUser.FullName || '-'}</p>
                <p><strong>${t('lbl_email')}:</strong> ${currentUser.Email}</p>
                <p><strong>${currentLang==='ar'?'الدور':'Rôle'}:</strong> ${currentUser.Role}</p>
                <button class="btn btn-outline btn-sm mt-2" onclick="editUserName()">${currentLang==='ar'?'تعديل الاسم':'Modifier le nom'}</button>
              </div>
              <h3 class="mt-3" style="font-weight:700;">${t('btn_fav')} (${favProducts.length})</h3>
              <div class="products-grid" style="margin-top:16px;">
                ${favProducts.length === 0 ? `<p style="color:var(--gray-500);">${currentLang==='ar'?'لا توجد منتجات في المفضلة':'Aucun favori'}</p>` : favProducts.map(p => productCard(p)).join('')}
              </div>
            </div>`;
        }

        function editUserName() {
            const newName = prompt(currentLang === 'ar' ? 'الاسم الجديد:' : 'Nouveau nom:');
            if (newName && currentUser) {
                currentUser.FullName = newName;
                localStorage.setItem('dzyn_user', JSON.stringify(currentUser));
                renderPage();
                showToast(currentLang === 'ar' ? 'تم تحديث الاسم' : 'Nom mis à jour', 'success');
            }
        }

        async function renderAdmin() {
            const main = document.getElementById('mainContent');
            if (!currentUser || currentUser.Role !== 'admin') return;
            const usersResult = await apiCall('getUsers');
            const users = usersResult.data || [];
            const ordersResult = await apiCall('getOrders');
            const orders = ordersResult.data || [];
            const notifResult = await apiCall('getNotifications');
            const notifications = notifResult.data || [];
            const totalSales = orders.reduce((s, o) => s + (Number(o.Price) || 0), 0);
            const newOrders = orders.filter(o => o.Status === 'Pending').length;
            const completedOrders = orders.filter(o => o.Status === 'Delivered').length;
            const outOfStock = allProducts.filter(p => parseInt(p.Stock) <= 0).length;
            const reviewsResult = await apiCall('getReviews', { productId: 'all' });
            const allReviews = reviewsResult.data || [];

            main.innerHTML = `
            <div class="container section" style="padding-top:20px;">
              <div class="admin-layout">
                <div class="admin-sidebar">
                  <a class="active" onclick="switchAdminTab('dashboard',this)">📊 ${currentLang==='ar'?'لوحة التحكم':'Tableau de Bord'}</a>
                  <a onclick="switchAdminTab('products',this)">📦 ${t('nav_products')}</a>
                  <a onclick="switchAdminTab('orders',this)">📋 ${currentLang==='ar'?'الطلبات':'Commandes'}</a>
                  <a onclick="switchAdminTab('users',this)">👥 ${currentLang==='ar'?'المستخدمين':'Utilisateurs'}</a>
                  <a onclick="switchAdminTab('reviews',this)">⭐ ${currentLang==='ar'?'التقييمات':'Avis'}</a>
                  <a onclick="switchAdminTab('notifications',this)">🔔 ${currentLang==='ar'?'الإشعارات':'Notifications'}</a>
                  <a onclick="switchAdminTab('settings',this)">⚙️ ${currentLang==='ar'?'الإعدادات':'Paramètres'}</a>
                  <a onclick="navigateTo('home')" style="color:var(--gray-500);">🏠 ${t('nav_home')}</a>
                </div>
                <div class="admin-main" id="adminContent">
                  ${renderAdminDashboard(users, orders, notifications, totalSales, newOrders, completedOrders, outOfStock, allReviews)}
                </div>
              </div>
            </div>`;
        }

        function switchAdminTab(tab, el) {
            adminTab = tab;
            document.querySelectorAll('.admin-sidebar a').forEach(a => a.classList.remove('active'));
            if (el) el.classList.add('active');
            refreshAdminTab();
        }

        function refreshAdminTab() {
            const content = document.getElementById('adminContent');
            if (!content) return;
            switch (adminTab) {
                case 'dashboard':
                    content.innerHTML = renderAdminDashboard([], [], [], 0, 0, 0, allProducts.filter(p => parseInt(p
                        .Stock) <= 0).length, []);
                    break;
                case 'products':
                    content.innerHTML = renderAdminProducts();
                    break;
                case 'orders':
                    content.innerHTML = renderAdminOrders();
                    break;
                case 'users':
                    content.innerHTML = renderAdminUsers();
                    break;
                case 'reviews':
                    content.innerHTML = renderAdminReviews();
                    break;
                case 'notifications':
                    content.innerHTML = renderAdminNotifications();
                    break;
                case 'settings':
                    content.innerHTML = renderAdminSettings();
                    break;
                default:
                    content.innerHTML = renderAdminDashboard([], [], [], 0, 0, 0, allProducts.filter(p => parseInt(p
                        .Stock) <= 0).length, []);
            }
        }

        function renderAdminDashboard(users, orders, notifications, totalSales, newOrders, completedOrders, outOfStock,
            reviews) {
            return `
            <h3 style="font-weight:800;margin-bottom:20px;">📊 ${currentLang==='ar'?'لوحة التحكم':'Tableau de Bord'}</h3>
            <div class="admin-stats">
              <div class="admin-stat-card"><div class="stat-num">${users.length}</div><div class="stat-label">${currentLang==='ar'?'المستخدمين':'Utilisateurs'}</div></div>
              <div class="admin-stat-card"><div class="stat-num">${allProducts.length}</div><div class="stat-label">${t('nav_products')}</div></div>
              <div class="admin-stat-card"><div class="stat-num">${orders.length}</div><div class="stat-label">${currentLang==='ar'?'الطلبات':'Commandes'}</div></div>
              <div class="admin-stat-card"><div class="stat-num" style="color:var(--blue);">${newOrders}</div><div class="stat-label">${currentLang==='ar'?'طلبات جديدة':'Nouvelles'}</div></div>
              <div class="admin-stat-card"><div class="stat-num" style="color:var(--green);">${completedOrders}</div><div class="stat-label">${currentLang==='ar'?'مكتملة':'Terminées'}</div></div>
              <div class="admin-stat-card"><div class="stat-num" style="color:var(--red);">${outOfStock}</div><div class="stat-label">${currentLang==='ar'?'نافدة المخزون':'Épuisés'}</div></div>
              <div class="admin-stat-card"><div class="stat-num">${Number(totalSales).toLocaleString()}</div><div class="stat-label">DZD ${currentLang==='ar'?'إجمالي المبيعات':'Ventes Totales'}</div></div>
              <div class="admin-stat-card"><div class="stat-num">${reviews.length}</div><div class="stat-label">${currentLang==='ar'?'التقييمات':'Avis'}</div></div>
            </div>`;
        }

        function renderAdminProducts() {
            return `
            <h3 style="font-weight:800;margin-bottom:16px;">📦 ${t('nav_products')}</h3>
            <button class="btn btn-primary btn-sm mb-2" onclick="addNewProduct()">+ ${currentLang==='ar'?'إضافة منتج':'Ajouter Produit'}</button>
            <div style="overflow-x:auto;">
              <table class="admin-table">
                <thead><tr><th>ID</th><th>${currentLang==='ar'?'الاسم':'Nom'}</th><th>${currentLang==='ar'?'النوع':'Type'}</th><th>${currentLang==='ar'?'السعر':'Prix'}</th><th>${currentLang==='ar'?'المخزون':'Stock'}</th><th>${currentLang==='ar'?'ظاهر':'Visible'}</th><th>${currentLang==='ar'?'إجراءات':'Actions'}</th></tr></thead>
                <tbody>
                  ${allProducts.map(p => `
                    <tr>
                      <td>${p.ProductID}</td>
                      <td>${p.Name}</td>
                      <td>${p.Type}</td>
                      <td>${Number(p.NewPrice).toLocaleString()} DZD</td>
                      <td style="color:${parseInt(p.Stock)<=0?'var(--red)':'var(--green)'}">${p.Stock}</td>
                      <td>${p.Visible==='true'?'✅':'❌'}</td>
                      <td>
                        <button class="btn btn-outline btn-sm" onclick="toggleProductVisibility('${p.ProductID}')">${p.Visible==='true'?'👁️':'👁️‍🗨️'}</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteProduct('${p.ProductID}')">🗑️</button>
                      </td>
                    </tr>`).join('')}
                </tbody>
              </table>
            </div>`;
        }

        function renderAdminOrders() { return `<h3>📋 ${currentLang==='ar'?'الطلبات':'Commandes'}</h3><p>${currentLang==='ar'?'ستظهر الطلبات هنا':'Les commandes apparaîtront ici'}</p>`; }

        function renderAdminUsers() { return `<h3>👥 ${currentLang==='ar'?'المستخدمين':'Utilisateurs'}</h3><p>${currentLang==='ar'?'إدارة المستخدمين':'Gestion des utilisateurs'}</p>`; }

        function renderAdminReviews() { return `<h3>⭐ ${currentLang==='ar'?'التقييمات':'Avis'}</h3><p>${currentLang==='ar'?'إدارة التقييمات':'Gestion des avis'}</p>`; }

        function renderAdminNotifications() { return `<h3>🔔 ${currentLang==='ar'?'الإشعارات':'Notifications'}</h3><p>${currentLang==='ar'?'لا توجد إشعارات':'Aucune notification'}</p>`; }

        function renderAdminSettings() {
            return `
            <h3>⚙️ ${currentLang==='ar'?'الإعدادات':'Paramètres'}</h3>
            <p style="color:var(--gray-500);">${currentLang==='ar'?'يمكن تعديل الإعدادات من Google Sheets (ورقة Settings)':'Les paramètres peuvent être modifiés depuis Google Sheets (feuille Settings)'}</p>`;
        }

        async function toggleProductVisibility(productId) {
            const product = allProducts.find(p => p.ProductID === productId);
            if (!product) return;
            product.Visible = product.Visible === 'true' ? 'false' : 'true';
            await apiCall('updateProduct', { productId, visible: product.Visible });
            refreshAdminTab();
            showToast(currentLang === 'ar' ? 'تم التحديث' : 'Mis à jour', 'success');
        }

        async function deleteProduct(productId) {
            if (confirm(currentLang === 'ar' ? 'هل أنت متأكد من حذف هذا المنتج؟' : 'Confirmer la suppression ?')) {
                await apiCall('deleteProduct', { productId });
                allProducts = allProducts.filter(p => p.ProductID !== productId);
                refreshAdminTab();
                showToast(currentLang === 'ar' ? 'تم الحذف' : 'Supprimé', 'success');
            }
        }

        function addNewProduct() {
            const newId = 'P' + Date.now();
            const newProduct = {
                ProductID: newId,
                Name: currentLang === 'ar' ? 'منتج جديد' : 'Nouveau Produit',
                Type: 'Clothes',
                Description: '',
                OldPrice: '0',
                NewPrice: '0',
                Stock: '10',
                Sizes: 'S,M,L',
                Colors: 'أسود,أبيض',
                Images: 'https://picsum.photos/seed/new/600/800',
                MainImage: 'https://picsum.photos/seed/new/600/800',
                Visible: 'true',
                Featured: 'false',
                BestSeller: 'false',
                CreatedAt: new Date().toISOString().split('T')[0],
                UpdatedAt: new Date().toISOString().split('T')[0],
            };
            allProducts.unshift(newProduct);
            refreshAdminTab();
            showToast(currentLang === 'ar' ? 'تمت الإضافة، عدّله من Google Sheets' : 'Ajouté, modifiez-le depuis Google Sheets',
                'info');
        }

        // ==================== INITIALIZATION ====================
        async function init() {
            showLoading();
            // Set initial language
            document.documentElement.lang = currentLang;
            document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
            document.body.className = currentLang === 'fr' ? 'fr' : '';
            document.querySelectorAll('.nav-lang-btn').forEach(b => {
                b.classList.toggle('active-lang', b.textContent.trim().toLowerCase() === currentLang);
            });
            // Load initial data
            const result = await apiCall('getAllProducts');
            allProducts = result.data || [];
            updateNavUI();
            renderPage();
            hideLoading();
        }

        // Scroll event for navbar
        window.addEventListener('scroll', () => {
            const navbar = document.getElementById('navbar');
            if (navbar) {
                navbar.classList.toggle('scrolled', window.scrollY > 10);
            }
        });

        // Start the app
        document.addEventListener('DOMContentLoaded', init);

        console.log('%c DZYN Store %c Ready ',
            'background:#000;color:#fff;padding:8px 12px;font-size:1.2rem;font-weight:900;letter-spacing:4px;',
            'background:#fff;color:#000;padding:8px 12px;border:1px solid #000;');
        console.log('%c Google Apps Script URL must be configured in CONFIG.googleScriptURL',
            'color:#dc2626;font-weight:bold;');
    </script>
</body>
